name: Verify AgentWall Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgomp1
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Debug Directory Structure
      run: ls -R

    - name: Smoke Test (Server Startup)
      env:
        AGENTWALL_ADMIN_PASSWORD: admin
        AGENTWALL_AUTH_ENABLED: "0"
        AGENTWALL_DB: ":memory:"
        PYTHONPATH: .
      run: |
        # Start server in background and capture output
        python -m uvicorn agentwall.main:app --host 127.0.0.1 --port 8080 > server_log.txt 2>&1 &
        SERVER_PID=$!
        
        # Wait to see if it stays alive
        sleep 10
        
        # Check if process is still running
        if kill -0 $SERVER_PID 2>/dev/null; then
          echo "Server started successfully."
          kill $SERVER_PID
        else
          echo "Server crashed on startup! Logs:"
          cat server_log.txt
          
          # Push logs to a new branch so we can read them without logging into GitHub
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git checkout -b ci-error-logs
          git add server_log.txt
          git commit -m "chore: save CI failure logs"
          git push origin ci-error-logs --force
          
          exit 1
        fi


    - name: Docker Build Test
      run: |
        docker build -t agentwall-test .
