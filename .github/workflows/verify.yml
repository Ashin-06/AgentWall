name: Verify AgentWall Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Smoke Test (Server Startup)
      run: |
        # Try to start the server for 5 seconds to ensure no immediate crashes
        timeout 10s python -m uvicorn agentwall.main:app --host 127.0.0.1 --port 8080 || code=$?; if [ $code -ne 124 ]; then exit $code; fi

    - name: Docker Build Test
      run: |
        docker build -t agentwall-test .
