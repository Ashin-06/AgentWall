# Production nginx reverse proxy with TLS termination.
# AgentWall runs on :8000 internally; nginx handles TLS on :443.

events { worker_connections 1024; }

http {
    upstream agentwall {
        server agentwall:8000;
        keepalive 64;
    }

    upstream dashboard {
        server dashboard:3000;
        keepalive 64;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name agentwall.yourcompany.com localhost 127.0.0.1;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https:;" always;

        # WebSocket support
        location /ws/ {
            proxy_pass          http://agentwall;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_read_timeout  3600s;
        }

        # API and WebSocket Endpoints
        location ~ ^/(api|intercept|auth|health|metrics|ws) {
            proxy_pass          http://agentwall;
            proxy_http_version  1.1;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    Upgrade           $http_upgrade;
            proxy_set_header    Connection        "upgrade";
            proxy_read_timeout  86400s;
            limit_req zone=agentwall_limit burst=200 nodelay;
        }

        # Dashboard (Frontend)
        location / {
            proxy_pass          http://dashboard;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host $host;
            proxy_read_timeout  86400;
        }
    }

    # Rate limit zone: 100 req/s per IP
    limit_req_zone $binary_remote_addr zone=agentwall_limit:10m rate=100r/s;

    # Logging
    log_format json_combined escape=json
        '{"ts":"$time_iso8601","ip":"$remote_addr","method":"$request_method",'
        '"path":"$uri","status":$status,"bytes":$bytes_sent,'
        '"rt":"$request_time","ua":"$http_user_agent"}';
    access_log /var/log/nginx/access.log json_combined;
}
